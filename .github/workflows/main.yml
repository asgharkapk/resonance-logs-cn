name: Build & Release

on:
  push:
    branches:
      - "**"

permissions:
  contents: write

concurrency:
 group: release-${{ github.ref }}
 cancel-in-progress: true

jobs:
  build:
    name: Build and Release
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri application
        run: npm run tauri build

      - name: Create portable package
        shell: pwsh
        run: |
          $APP_NAME = "resonance-logs-cn"

          New-Item -ItemType Directory -Force portable | Out-Null

          Copy-Item "src-tauri/target/release/$APP_NAME.exe" portable/

          if (Test-Path "src-tauri/WinDivert.dll") {
            Copy-Item "src-tauri/WinDivert.dll" portable/
          }

          if (Test-Path "src-tauri/WinDivert64.sys") {
            Copy-Item "src-tauri/WinDivert64.sys" portable/
          }

          if (Test-Path "src-tauri/meter-data") {
            Copy-Item "src-tauri/meter-data" portable/ -Recurse
          }

          Compress-Archive `
            -Path portable/* `
            -DestinationPath "$APP_NAME-portable.zip"

      - name: Generate release tag
        id: tag
        shell: pwsh
        run: |
          $date = Get-Date -Format "yyyy.MM.dd"
          $tag = "v$date-r${{ github.run_number }}"
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Push Git tag
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag "${{ steps.tag.outputs.tag }}"
          git push origin "${{ steps.tag.outputs.tag }}"




      - name: Generate release notes
        id: notes
        shell: pwsh
        run: |
          $commit = git log -1 --pretty=format:"%s"
          $sha = (git rev-parse --short HEAD)
          $branch = "${{ github.ref_name }}"
          $date = Get-Date -Format "yyyy-MM-dd HH:mm:ss UTC"

          @"
          ## 📦 Build Information

          | Item | Value |
          |------|-------|
          | **Version** | ${{ steps.tag.outputs.tag }} |
          | **Branch** | $branch |
          | **Commit** | `$sha` |
          | **Commit Message** | $commit |
          | **Workflow Run** | #${{ github.run_number }} |
          | **Build Date** | $date |

          ## 📥 Downloads
          - **Installer (.msi)** – Recommended for most users
          - **Portable (.zip)** – No installation required
          - **Standalone executable (.exe)**
          - Other platform packages (if available)

          ## 📥 Included Assets

          | File | Description |
          |------|-------------|
          | **Portable ZIP** | Run without installation |
          | **MSI Installer** | Recommended installation method |
          | **Standalone EXE** | Direct executable |
          | **latest.json** | Auto-updater metadata |
          | **Other packages** | Linux packages (when available) |

          ## ✨ Highlights
          - 📊 Real-time DPS analysis and combat statistics
          - 🖥️ Customizable overlays and compact UI themes
          - 🎨 Theme customization (colors, fonts, layouts)
          - 🗺️ Interactive dungeon mechanic minimap overlays
          - ⚔️ Combat logging and parser accuracy verification
          - 🌐 Multi-language interface support
          - 🧩 Portable and installer builds included

          ## 📚 Documentation
          - English, Simplified Chinese and Japanese documentation
          - Complete feature guides
          - Dungeon mechanic documentation
          - Changelog and fork-specific changelog

          ## ⚠️ Important

          > [!IMPORTANT]
          > **Resonance Logs will not capture game data unless Npcap is installed.**
          >
          > Before launching the application for the first time, install **Npcap** from:
          >
          > https://npcap.com/#download
          >
          > If combat data is not appearing, packets are not being detected, or the application fails to capture network traffic, first verify that Npcap is installed. If the issue persists, open **Settings** and select the correct **Network Capture Device**.

          > [!TIP]
          > **VPN Users:** Connect your VPN **before launching Resonance Logs**.
          >
          > The application automatically selects the active network adapter during startup. If you connect or disconnect a VPN after the application has already started, it may continue monitoring the previous adapter instead of the VPN's virtual or loopback adapter.
          >
          > If packet detection stops after changing your VPN connection or network configuration, restart the application or manually select the correct **Network Capture Device** from **Settings**.

          ## 📝 What's Changed

          \$CHANGES
          "@ | Out-File release-template.md -Encoding utf8




      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body_path: release-template.md
          generate_release_notes: true
          append_body: true
          files: |
            resonance-logs-cn-portable.zip
            src-tauri/target/release/resonance-logs-cn.exe
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.zip
            src-tauri/target/release/bundle/**/*.tar.gz
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.rpm
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
